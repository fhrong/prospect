# ──────────────────────────────────────────────
# Evolution API + dependências
#
# Para subir:   docker-compose up -d
# Para parar:   docker-compose down
# Para logs:    docker-compose logs -f evolution
#
# Acesse o painel em: http://localhost:8080
# ──────────────────────────────────────────────

services:

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: prospect_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Chave global da API — troque por algo seguro
      AUTHENTICATION_API_KEY: "sua-chave-aqui"

      # Banco de dados
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://prospect:prospect123@postgres:5432/evolution"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # Cache
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/0"

      # Logs
      LOG_LEVEL: "ERROR"

      # Instâncias — salva estado no banco, não em arquivo
      DEL_INSTANCE: "false"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prospect_net

  postgres:
    image: postgres:16-alpine
    container_name: prospect_postgres
    restart: always
    environment:
      POSTGRES_USER: prospect
      POSTGRES_PASSWORD: prospect123
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prospect_net

  redis:
    image: redis:7-alpine
    container_name: prospect_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prospect_net

volumes:
  postgres_data:
  redis_data:

networks:
  prospect_net:
    driver: bridge